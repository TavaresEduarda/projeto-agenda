<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <title>Minha Rotina</title>
</head>
<body class="bg-dark text-light">

  <div class="container py-4">

    <h2 class="mb-4 text-center">Minha Rotina</h2>

    <!-- Formulário -->
    <div class="card bg-secondary p-3 mb-4">
      <div class="row g-2">
        <div class="col-md-3">
          <input type="date" id="date" class="form-control">
        </div>

        <div class="col-md-2">
          <input type="time" id="time" class="form-control">
        </div>

        <div class="col-md-5">
          <input type="text" id="description" class="form-control" placeholder="Descrição">
        </div>

        <div class="col-md-2 d-grid">
          <button class="btn btn-dark" onclick="addPost()">Adicionar</button>
        </div>
      </div>
    </div>

    <!-- Board -->
    <div class="row g-3" id="board"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
